<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vendorpay - Freelance Invoice Log</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#0C1A14; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .wrap { max-width:560px; text-align:center; padding:40px 24px; }
  h1 { font-size:2.2rem; margin-bottom:12px; color:#2E9E5B; }
  p { font-size:1.1rem; line-height:1.6; color:#e6e6e6; }
  .feature { margin-top:32px; padding:16px; border:1px solid #2E9E5B55; border-radius:12px; }
  a { color:#2E9E5B; }
  footer { margin-top:48px; font-size:0.85rem; color:#999; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #2E9E5B55 0%, #2E9E5B00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Vendorpay - Freelance Invoice Log</h1>
  <p>Track invoices sent to clients and whether they've been paid.</p>
  <div class="feature"><strong>Free:</strong> Log invoice amount, client, and paid status</div>
  <div class="feature"><strong>Pro:</strong> Overdue alerts and per-client earnings totals</div>
  <footer>
    <a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a><br>
    Contact: s0533495227@gmail.com
  </footer>
</div>
</body>
</html>
