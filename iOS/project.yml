name: Vendorpay
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  Vendorpay:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Vendorpay
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.freelanceinvoice
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        DEVELOPMENT_TEAM: W7Q885Q59C
    info:
      path: Vendorpay/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
  VendorpayTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VendorpayTests
    dependencies:
      - target: Vendorpay
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.freelanceinvoice.tests
        DEVELOPMENT_TEAM: W7Q885Q59C
  VendorpayUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VendorpayUITests
    dependencies:
      - target: Vendorpay
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.freelanceinvoice.uitests
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  Vendorpay:
    build:
      targets:
        Vendorpay: all
    test:
      targets:
        - VendorpayTests
        - VendorpayUITests
    run:
      config: Debug
